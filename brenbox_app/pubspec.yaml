name: brenbox_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  firebase_core: ^4.2.1
  firebase_auth: 6.1.2
  firebase_database: 12.1.0
  cloud_firestore: ^6.1.0
  firebase_storage: ^13.0.4
  intl: ^0.20.2

  file_picker: ^8.0.7
  flutter_pdfview: ^1.3.2
  path_provider: ^2.1.2

  google_sign_in: ^6.2.1





dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
     - assets/images/BrenboxLogo.png
     - assets/images/Brenbox_Applogo.png
     - assets/images/google_icon.png
     - assets/images/

flutter_launcher_icons:
  android: true
  ios: true  
  image_path: "assets/images/Brenbox_Applogo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/Brenbox_Applogo.png"
  remove_alpha_ios: true